<!DOCTYPE html>
<html>

<head>
    <title>Register</title>
</head>

<body>

    <h1>Register</h1>

    <input
        type="text"
        id="name"
        placeholder="Enter Name"
    >

    <br><br>

    <input
        type="email"
        id="email"
        placeholder="Enter Email"
    >

    <br><br>

    <input
        type="password"
        id="password"
        placeholder="Enter Password"
    >

    <br><br>

    <button onclick="registerUser()">
        Register
    </button>

    <br><br>

    <a href="login.html">
        Already have an account? Login
    </a>

    <script src="js/register.js"></script>

</body>

</html>
